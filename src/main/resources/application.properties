# Server
server.port=${PORT:8080}
spring.application.name=Edifika-ApiGateway

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# Service URLs para RoutesConfig
services.iam.url=${IAM_SERVICE_URL:http://localhost:8081}
services.residential.url=${RESIDENTIAL_SERVICE_URL:http://localhost:8082}
services.reservation.url=${RESERVATION_SERVICE_URL:http://localhost:8083}
services.payment.url=${PAYMENT_SERVICE_URL:http://localhost:8084}
services.communication.url=${COMMUNICATION_SERVICE_URL:http://localhost:8085}
services.forum.url=${FORUM_SERVICE_URL:http://localhost:8086}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://localhost:8087}
services.report.url=${REPORT_SERVICE_URL:http://localhost:8088}


# IAM SERVICE
spring.cloud.gateway.routes[0].id=iam-authentication-public
spring.cloud.gateway.routes[0].uri=${IAM_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates=Path=/api/v1/authentication/**
spring.cloud.gateway.routes[0].filters=StripPrefix=0

spring.cloud.gateway.routes[1].id=iam-roles
spring.cloud.gateway.routes[1].uri=${IAM_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[1].predicates=Path=/api/v1/roles/**
spring.cloud.gateway.routes[1].filters=StripPrefix=0

spring.cloud.gateway.routes[2].id=iam-users
spring.cloud.gateway.routes[2].uri=${IAM_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[2].predicates=Path=/api/v1/users/**
spring.cloud.gateway.routes[2].filters=StripPrefix=0

# RESIDENTIAL MANAGEMENT SERVICE
spring.cloud.gateway.routes[3].id=residential-all
spring.cloud.gateway.routes[3].uri=${RESIDENTIAL_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[3].predicates=Path=/api/v1/residential/**
spring.cloud.gateway.routes[3].filters=StripPrefix=0

# RESERVATION SERVICE
spring.cloud.gateway.routes[4].id=reservation-common-areas
spring.cloud.gateway.routes[4].uri=${RESERVATION_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[4].predicates=Path=/api/v1/common-areas/**
spring.cloud.gateway.routes[4].filters=StripPrefix=0

spring.cloud.gateway.routes[5].id=reservation-reservations
spring.cloud.gateway.routes[5].uri=${RESERVATION_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[5].predicates=Path=/api/v1/reservations/**
spring.cloud.gateway.routes[5].filters=StripPrefix=0

# PAYMENT SERVICE
spring.cloud.gateway.routes[6].id=payment-payments
spring.cloud.gateway.routes[6].uri=${PAYMENT_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[6].predicates=Path=/api/v1/payments/**
spring.cloud.gateway.routes[6].filters=StripPrefix=0

# COMMUNICATION SERVICE
spring.cloud.gateway.routes[7].id=communication-announcements
spring.cloud.gateway.routes[7].uri=${COMMUNICATION_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[7].predicates=Path=/api/v1/announcements/**
spring.cloud.gateway.routes[7].filters=StripPrefix=0

# FORUM SERVICE
spring.cloud.gateway.routes[8].id=forum-posts
spring.cloud.gateway.routes[8].uri=${FORUM_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.routes[8].predicates=Path=/api/v1/posts/**
spring.cloud.gateway.routes[8].filters=StripPrefix=0

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[10].id=notification-service
spring.cloud.gateway.routes[10].uri=${NOTIFICATION_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.routes[10].predicates=Path=/api/v1/notifications/**
spring.cloud.gateway.routes[10].filters=StripPrefix=0

spring.cloud.gateway.routes[11].id=notification-device
spring.cloud.gateway.routes[11].uri=${NOTIFICATION_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.routes[11].predicates=Path=/api/v1/device-tokens/**
spring.cloud.gateway.routes[11].filters=StripPrefix=0

# REPORT SERVICE
spring.cloud.gateway.routes[12].id=reports-service
spring.cloud.gateway.routes[12].uri=${REPORT_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.routes[12].predicates=Path=/api/v1/reports/**
spring.cloud.gateway.routes[12].filters=StripPrefix=0


# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.edifika.apigateway=INFO